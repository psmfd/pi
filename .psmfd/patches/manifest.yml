    patched_paths:
      - packages/agent/package.json
      - packages/ai/package.json
      - packages/coding-agent/package.json
      - package-lock.json
    evidence: >-
      vitest resolves to 3.2.6 in all three workspaces; `npm run check` and
      `./test.sh` pass under 3.2.6 (dev-only dependency).
    upstream_issue: null
    upstream_pr: null
    upstream_fixed_in: v0.79.8
    psmfd_commit: null
    psmfd_retire_commit: sync/upstream-v0.79.10

