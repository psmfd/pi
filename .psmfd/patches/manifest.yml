  - id: psmfd-patch-005
    status: active
    upstream_base: v0.80.2
    advisory: "CodeQL js/shell-command-constructed-from-input (psmfd/pi alerts 33-37)"
    severity: medium
    reporting: >-
      Not reported (ADR-0043). Out of upstream SECURITY.md scope: reachable only
      when installing a git-sourced package/extension ("installing untrusted
      packages" + "user-initiated local action"). Defense-in-depth hardening of
      git argument/transport handling; offerable as optional hardening via the
      contribution path, not pursued.
    description: >-
      parseGitUrl/buildGitSource build git repo/ref strings from a package
      source URL that flow into `git clone`/`fetch`/`checkout`. psmfd-patch-001
      guarded the ref; this completes the hardening of the same surface:
      (a) pass `--end-of-options` before source.repo at the clone sink so a
      repo string can never be parsed as a git option; (b) reject option-like
      (leading "-"), control-character and whitespace host/path components in
      hasUnsafeGitInstallPart, matching the existing ref guard; (c) reject git
      transport helpers (ext::/fd::), the "<transport>::<address>" remote-helper
      syntax, and file:// local-clone transports in parseGitUrl even under the
      git: prefix that relaxes the protocol allowlist. No shell is used at the
      sinks (argv spawn), so this closes the residual git-argument/transport
      surface rather than a shell-injection one.
    patched_paths:
      - packages/coding-agent/src/utils/git.ts
      - packages/coding-agent/src/core/package-manager.ts
      - packages/coding-agent/test/git-ssh-url.test.ts
      - packages/coding-agent/test/package-manager.test.ts
    evidence: >-
      Regression tests: git-ssh-url.test.ts rejects ext::/fd::/file:// transports
      and option-shaped/whitespace host/path; package-manager.test.ts asserts the
      clone runs with `--end-of-options`. `npm run check` + `./test.sh` clean.
    upstream_issue: null
    upstream_pr: null
    upstream_fixed_in: null
    psmfd_commit: null
    psmfd_retire_commit: null

  - id: psmfd-patch-006
    status: retired
    upstream_base: v0.79.5
    advisory: "GHSA-vmh5-mc38-953g (high), GHSA-38rv-x7px-6hhq (high), GHSA-pr7r-676h-xcf6 (medium)"
    severity: high
    reporting: >-
      Determination pending maintainer (ADR-0043). Unlike the dev/build-only
      patches, undici is a runtime HTTP/proxy/WebSocket dependency reachable
      through Pi, so these findings may fall inside upstream SECURITY.md scope.
      Upstream reporting is human-led; materials are preparable but the agent
      does not file. Likely retires on the upstream bump + sync.
    description: >-
      undici >= 8.0.0 < 8.5.0: TLS certificate validation bypass via dropped
      requestTls in the SOCKS5 ProxyAgent (GHSA-vmh5-mc38-953g), WebSocket client
      DoS via cumulative fragment bypass (GHSA-38rv-x7px-6hhq), and cross-user
      cache information disclosure via whitespace bypass (GHSA-pr7r-676h-xcf6).
      Direct runtime dependency of @earendil-works/pi (coding-agent). No upstream
      fix or fix in flight at v0.79.5 (verified: no open PR, issue, or commit).
      Fix: bump undici 8.3.0 -> 8.5.0. (The gondolin example's transitive undici
      6.26.0 is outside the >= 8.0.0 vulnerable range and unaffected.)
    patched_paths:
      - packages/coding-agent/package.json
      - package-lock.json
      - packages/coding-agent/npm-shrinkwrap.json
    evidence: >-
      undici resolves to 8.5.0 (root lockfile + published shrinkwrap); npm audit
      clears all three GHSAs; `npm run check` and `./test.sh` pass.
    upstream_issue: null
    upstream_pr: null
    upstream_fixed_in: v0.79.8
    psmfd_commit: null
    psmfd_retire_commit: sync/upstream-v0.79.10

  - id: psmfd-patch-007
    status: retired
    upstream_base: v0.79.5
    advisory: "protobufjs GHSA-wcpc-wj8m-hjx6 (high), GHSA-f38q-mgvj-vph7 (medium); ws GHSA-96hv-2xvq-fx4p (high); vite GHSA-fx2h-pf6j-xcff (high), GHSA-v6wh-96g9-6wx3 (medium)"
    severity: high
    reporting: >-
      Mixed (ADR-0043). protobufjs and ws are runtime deps reachable through Pi's
      provider HTTP/WebSocket layer (@google/genai, @mistralai/mistralai, openai)
      and may fall inside upstream SECURITY.md scope — reporting is human-led, not
      auto-filed. vite is dev/build-only (test tooling, dev-server-only advisories)
      and is out of upstream scope.
    description: >-
      Vulnerable transitive dependencies that a stale lockfile pinned below the
      patched versions their parents' ranges already permit. Per ADR-0044 (pi_config)
      security entries are added to the root `overrides` block and the tree
      re-resolved: protobufjs 7.5.9 -> 7.6.4 (via @google/genai ^7.5.4), ws
      8.20.1 -> 8.21.0 (via the provider SDKs ^8.18.0), vite 7.3.3 -> 7.3.5 (via
      vitest). The coding-agent shrinkwrap install-script allowlist is bumped
      protobufjs@7.5.9 -> 7.6.4 (same benign version-scheme postinstall). No
      upstream fix or fix in flight at v0.79.5 (verified: no open PR/issue/commit).
      ACCEPTED RESIDUAL: the transitive vite->esbuild 0.27.7 (GHSA-g7r4-m6w7-qqqr,
      low, dev-server-on-Windows file read) is not fixed — esbuild 0.28.1 is
      outside vite's pinned esbuild range and forcing it risks the dev build;
      retires when upstream vite bundles a patched esbuild.
    patched_paths:
      - package.json
      - package-lock.json
      - packages/coding-agent/npm-shrinkwrap.json
      - scripts/generate-coding-agent-shrinkwrap.mjs
    evidence: >-
      npm audit clears the protobufjs, ws, and vite advisories (only the accepted
      esbuild low residual remains); `npm run check` and `./test.sh` pass with
      vitest running under vite 7.3.5.
    upstream_issue: null
    upstream_pr: null
    upstream_fixed_in: v0.79.8
    psmfd_commit: null
    psmfd_retire_commit: sync/upstream-v0.79.10
