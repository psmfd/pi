---
# psmfd-secrets-scan.yml — secret scan via a pinned public gitleaks container.
#
# Self-contained psmfd-* workflow. The public mirror cannot consume the PRIVATE
# pi_config reusable workflow (GitHub blocks public->private reusable-workflow
# calls), so the shared scanner is delivered here as a pinned PUBLIC container
# image rather than a reusable workflow. The image digest is the shared version
# pin and is bumped deliberately (no Dependabot: the digest lives in a `run:`
# step, which Dependabot does not parse, and deliberate review-gated bumps match
# the mirror's no-network-injection posture). Keep the pinned gitleaks version in
# step with pi_config's vendored binary pin (ADR-0037).
#
# The scan uses the mirror's OWN .gitleaks.toml (commit/path-scoped upstream-
# public allowlists). Design + rationale: pi_config ADR-0048. Approval record:
# .psmfd/workflow-allowlist.yml.
name: psmfd-secrets-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: psmfd-secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history for range scan)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          null="0000000000000000000000000000000000000000"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            old="$PR_BASE_SHA"; new="$PR_HEAD_SHA"
          else
            old="$PUSH_BEFORE"; new="$PUSH_AFTER"
          fi
          # Null OLD (first push / force-push base / new branch) -> scan all
          # history reachable from NEW rather than a broken range.
          if [ -z "$old" ] || [ "$old" = "$null" ]; then
            echo "logopts=$new" >> "$GITHUB_OUTPUT"
          else
            echo "logopts=${old}..${new}" >> "$GITHUB_OUTPUT"
          fi

      - name: Gitleaks scan (pinned public container)
        env:
          # gitleaks 8.30.1 — keep in step with pi_config vendored binary (ADR-0037).
          GITLEAKS_IMAGE: ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          LOG_OPTS: ${{ steps.range.outputs.logopts }}
        run: |
          set -euo pipefail
          echo "INFO  scanning range: ${LOG_OPTS}"
          docker run --rm \
            --volume "${GITHUB_WORKSPACE}:/repo:ro" \
            "${GITLEAKS_IMAGE}" \
            git /repo \
            --config /repo/.gitleaks.toml \
            --log-opts="${LOG_OPTS}" \
            --redact=100 \
            --no-banner \
            --exit-code=1
