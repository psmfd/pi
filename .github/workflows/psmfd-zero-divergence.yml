---
name: PSMFD zero-divergence guard

'on':
  pull_request:
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  overlay-path-guard:
    name: enforce overlay path allowlist
    runs-on: ubuntu-latest
    steps:
      - name: Check changed paths
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          TRUSTED_SYNC_ACTOR: TheSemicolon
        run: |
          set -euo pipefail

          : "${GH_TOKEN:?}"
          : "${GITHUB_REPOSITORY:?}"
          : "${PR_NUMBER:?}"
          : "${HEAD_REF:?}"
          : "${HEAD_REPO:?}"
          : "${PR_AUTHOR:?}"
          : "${CHANGED_FILES:?}"

          if [[ "${HEAD_REF}" == sync/upstream-* ]] && \
             [[ "${HEAD_REPO}" == "${GITHUB_REPOSITORY}" ]] && \
             [[ "${PR_AUTHOR}" == "${TRUSTED_SYNC_ACTOR}" ]]; then
            echo "Trusted upstream-sync PR; overlay-only path guard skipped."
            exit 0
          fi

          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
            > files.json

          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          EXACT = {
              "PROVENANCE.md",
              "README.md",
              "README.psmfd.md",
              "SECURITY.md",
              "NOTICE.psmfd.md",
              ".gitleaks.toml",
              ".github/CODEOWNERS",
              ".github/dependabot.yml",
          }
          # Security-patch exemptions (ADR-0041): upstream-owned paths that carry
          # a manifest-tracked PSMFD security patch applied because no upstream
          # fix exists/is in flight. TEMPORARY — each path is registered in
          # .psmfd/patches/manifest.yml and REMOVED here when the patch is
          # retired after upstream ships its own fix. Keep in lockstep with
          # .psmfd/overlay-allowlist.txt and the manifest. This widens the
          # allowlist data only; it does not change the guard's trust model, and
          # every such change still requires maintainer review before merge.
          SECURITY_PATCH_PATHS = {
              # psmfd-patch-001 — git-ref flag injection (CodeQL 19/22)
              "packages/coding-agent/src/utils/git.ts",
              "packages/coding-agent/src/core/package-manager.ts",
              "packages/coding-agent/test/git-ssh-url.test.ts",
              "packages/coding-agent/test/git-update.test.ts",
              "packages/coding-agent/test/package-manager.test.ts",
              # psmfd-patch-002 — vitest CVE-2026-47429
              "packages/agent/package.json",
              "packages/ai/package.json",
              "packages/coding-agent/package.json",
              "package-lock.json",
              # psmfd-patch-003 — shell-quote CVE-2026-9277 (sandbox lockfile)
              "packages/coding-agent/examples/extensions/sandbox/package-lock.json",
              # psmfd-patch-004 — esbuild GHSA-gv7w/GHSA-g7r4 (root package.json; lockfile already listed)
              "package.json",
              # psmfd-patch-006 — undici GHSA-vmh5/GHSA-38rv/GHSA-pr7r (shrinkwrap; coding-agent package.json + lockfile already listed)
              "packages/coding-agent/npm-shrinkwrap.json",
          }
          REGEXES = (
              re.compile(r"^\.psmfd/.+"),
              re.compile(r"^\.github/workflows/psmfd-[^/]+\.ya?ml$"),
              re.compile(r"^\.github/workflows-upstream-reference/[^/]+\.ya?ml$"),
              re.compile(r"^\.github/workflows-upstream-reference/README\.md$"),
          )

          def allowed(path: str) -> bool:
              if path in EXACT or path in SECURITY_PATCH_PATHS:
                  return True
              return any(regex.match(path) for regex in REGEXES)

          try:
              expected_count = int(os.environ["CHANGED_FILES"])
          except (KeyError, ValueError) as exc:
              raise SystemExit(f"invalid CHANGED_FILES value: {exc}")

          if expected_count > 3000:
              raise SystemExit(
                  "PR changes more than 3000 files; GitHub's PR-files API "
                  "cannot provide a complete list, so failing closed."
              )

          with open("files.json", encoding="utf-8") as handle:
              data = json.load(handle)

          if not isinstance(data, list):
              raise SystemExit("unexpected PR files payload shape")

          records = []
          for page in data:
              if not isinstance(page, list):
                  raise SystemExit("unexpected PR files page shape")
              for item in page:
                  if not isinstance(item, dict):
                      raise SystemExit("unexpected PR file record shape")
                  filename = item.get("filename")
                  if not isinstance(filename, str) or not filename:
                      raise SystemExit("PR file record missing filename")
                  records.append(item)

          if len(records) != expected_count:
              raise SystemExit(
                  f"PR files payload incomplete: expected {expected_count}, "
                  f"received {len(records)}. Failing closed."
              )

          violations = []
          for item in records:
              status = item.get("status", "unknown")
              for key in ("filename", "previous_filename"):
                  path = item.get(key)
                  if path and not allowed(path):
                      violations.append({
                          "status": status,
                          "field": key,
                          "path": path,
                      })

          if violations:
              print("Non-overlay paths changed; zero-divergence guard failed.")
              print(json.dumps(violations, indent=2, sort_keys=True))
              sys.exit(1)

          print(f"Overlay path guard passed for {len(records)} changed files.")
          PY
